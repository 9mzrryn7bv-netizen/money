<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>全方位財務分配報表 - 明亮清爽版 v9</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>:root{--paper:#faf9f6;--card:#ffffff;--ink:#22252b;--ink-soft:#7a7f8a;--line:#edece6;
--income:#dc9a26; --income-bg:#fdf4e0; --income-deep:#9c6c14;--expense:#2b9e86; --expense-bg:#e7f7f3; --expense-deep:#1f7566;--assets:#5271e0; --assets-bg:#eef1fd; --assets-deep:#37509e;--loan:#c15c50; --loan-bg:#fbece9; --loan-deep:#963f35;--danger:#e2665a; --danger-bg:#fdeceb;}body{font-family:'Noto Sans TC', sans-serif;background-color: var(--paper);-webkit-overflow-scrolling: touch;overscroll-behavior: contain;}.custom-scrollbar{-webkit-overflow-scrolling: touch;}html{ -webkit-text-size-adjust: 100%; }.font-display{ font-family:'Manrope','Noto Sans TC', sans-serif; }.font-num{ font-family:'Manrope','Noto Sans TC', sans-serif; font-feature-settings:"tnum"; }

<script type="text/babel">const { useState, useRef, useLayoutEffect, useEffect } = React;
// 金額輸入框：輸入時自動加上千分位逗號，避免大數字（例如貸款）看錯位數
const MoneyInput = ({ value, onChange, placeholder, className, style }) => {
  const format = (v) => {
    if (v === '' || v === null || v === undefined) return '';
    const n = Number(v);
    return isNaN(n) ? '' : n.toLocaleString('en-US');
  };
  const [display, setDisplay] = useState(format(value));
  useEffect(() => { setDisplay(format(value)); }, [value]);
  const handle = (e) => {
    const raw = e.target.value.replace(/[^0-9]/g, '');
    setDisplay(raw === '' ? '' : Number(raw).toLocaleString('en-US'));
    onChange(raw);
  };
  return (<input type="text" inputMode="numeric" value={display} onChange={handle} placeholder={placeholder} className={className} style={style} />);
};

// ---------- 圖示（簡約線條風） ----------
const IconCoin = ({color}) => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 15.2c.4.9 1.3 1.4 2.5 1.4 1.7 0 2.8-.9 2.8-2.1 0-3-5.4-1.4-5.4-4.3 0-1.2 1.1-2.1 2.7-2.1 1.1 0 2 .5 2.4 1.3M12 6.3v1.1M12 16.6v1.1"/></svg>);
const IconWallet = ({color}) => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H18a1 1 0 0 1 1 1v2"/><path d="M3 7.5v10A2.5 2.5 0 0 0 5.5 20H19a1 1 0 0 0 1-1v-4.5"/><rect x="14" y="10.5" width="7" height="5" rx="1.2"/><circle cx="17" cy="13" r="0.6" fill={color}/></svg>);
const IconChart = ({color}) => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><rect x="7" y="12" width="3" height="7" rx="0.6"/><rect x="12.5" y="8" width="3" height="11" rx="0.6"/><rect x="18" y="14.5" width="3" height="4.5" rx="0.6"/></svg>);
const IconShield = ({color}) => (<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.5 5 6.5v5c0 5 3 8 7 9 4-1 7-4 7-9v-5l-7-3Z"/></svg>);
const IconPiggy = ({color}) => (<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12.5c0-3.6 3.1-6 7.3-6 3 0 5.4 1.1 6.7 3H19a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-1v2.2c0 .8-.6 1.3-1.3 1.3H14l-.6 2h-3l-.4-2c-3.3-.5-6-2.4-6-4.5Z"/><circle cx="9.5" cy="12" r="0.6" fill={color}/></svg>);
const IconHome = ({color}) => (<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v8.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V10"/></svg>);
const IconTarget = ({color, size=20}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.8"/><circle cx="12" cy="12" r="1.1" fill={color}/></svg>);
const IconAlert = ({color, size=20}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.5 21.5 20h-19L12 3.5Z"/><path d="M12 10v4.2"/><circle cx="12" cy="17.3" r="0.15" fill={color} stroke="none"/><circle cx="12" cy="17.3" r="0.9" fill={color}/></svg>);
const IconSearch = ({color, size=20}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m19.5 19.5-4.3-4.3"/></svg>);
const IconBulb = ({color, size=20}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6.5 6.5 0 0 0-3.8 11.8c.6.45 1 1.1 1 1.9v.3h5.6v-.3c0-.8.4-1.45 1-1.9A6.5 6.5 0 0 0 12 3Z"/></svg>);

// ---------- 美編元件 ----------
const TONE_COLORS = {
  income: { bg: '#fdf4e0', deep: '#9c6c14' },
  expense: { bg: '#e7f7f3', deep: '#1f7566' },
  assets: { bg: '#eef1fd', deep: '#37509e' },
  loan: { bg: '#fbece9', deep: '#963f35' },
};
const CategoryChip = ({ icon, label, zh, tone }) => {
  const c = TONE_COLORS[tone];
  return (<div className="flex w-fit items-center gap-2.5 pl-3 pr-4 py-2 rounded-full" style={{background: c.bg}}>{icon}<span className="font-num text-[11px] font-bold tracking-[0.18em]" style={{color: c.deep}}>{label.toUpperCase()}</span><span className="text-[13px] font-bold" style={{color:'#22252b'}}>{zh}</span></div>);
};

const ValueBox = ({ value, size="text-4xl" }) => (<div className="flex items-baseline gap-1.5"><span className="text-lg font-num font-bold" style={{color:'#c7c4ba'}}>$</span><span className={`font-num font-extrabold tracking-tight ${size}`} style={{color:'var(--ink)'}}>{value.toLocaleString()}</span></div>);

const SectionTitle = ({ children, amount, icon }) => (<div className="flex items-center justify-between pb-2.5 mt-6 mb-4" style={{borderBottom:'1.5px solid var(--line)'}}><h3 className="font-bold text-[14.5px] flex items-center gap-2" style={{color:'var(--ink)'}}>{icon}{children}</h3>{amount !== undefined && (<span className="font-num font-bold tracking-wide text-[14.5px]" style={{color:'var(--ink-soft)'}}>${amount.toLocaleString()}</span>)}</div>);

const App = () => {
  const reportRef = useRef(null);
  const [isDownloading, setIsDownloading] = useState(false);

  const [userName, setUserName] = useState('');
  const [advisorName, setAdvisorName] = useState('');
  const [incomes, setIncomes] = useState([{ id: 1, name: '', amount: 0, note: '' }]);
  const [livingExps, setLivingExps] = useState([{ id: 1, name: '', amount: 0, note: '' }]);
  const [savingExps, setSavingExps] = useState([{ id: 1, name: '', amount: 0, note: '' }]);
  const [insuranceExps, setInsuranceExps] = useState([{ id: 1, name: '', amount: 0, note: '' }]);
  const [assets, setAssets] = useState([{ id: 1, name: '', amount: 0, note: '' }]);
  const [loans, setLoans] = useState([{ id: 1, name: '', amount: 0, note: '' },]);

  // 第二頁：財務規劃紀錄
  const [goals, setGoals] = useState('');
  const [futureEvents, setFutureEvents] = useState('');
  const [blindSpots, setBlindSpots] = useState('');
  const [advice, setAdvice] = useState('');

  const [branches, setBranches] = useState([{ id: 'b1', amount: 0, t1: '', t2: '', t3: '', subBranches: [] }]);

  // ---- 樹狀圖連接線 ----
  const treeWrapRef = useRef(null);
  const branchCardRefs = useRef({});
  const subWrapRefs = useRef({});
  const subCardRefs = useRef({});
  const [mainLine, setMainLine] = useState({ width: 0, points: [] });
  const [subLines, setSubLines] = useState({});

  const measureTree = () => {
    if (!treeWrapRef.current) return;
    const treeRect = treeWrapRef.current.getBoundingClientRect();
    const points = branches.map(b => {
      const el = branchCardRefs.current[b.id];
      if (!el) return 0;
      const r = el.getBoundingClientRect();
      return (r.left + r.width / 2) - treeRect.left;
    });
    setMainLine({ width: treeRect.width, points });

    const subMap = {};
    branches.forEach(b => {
      if (!b.subBranches.length) return;
      const wrapEl = subWrapRefs.current[b.id];
      const cardEl = branchCardRefs.current[b.id];
      if (!wrapEl || !cardEl) return;
      const wrapRect = wrapEl.getBoundingClientRect();
      const cardRect = cardEl.getBoundingClientRect();
      const origin = (cardRect.left + cardRect.width / 2) - wrapRect.left;
      const pts = b.subBranches.map(s => {
        const el = (subCardRefs.current[b.id] || {})[s.id];
        if (!el) return 0;
        const r = el.getBoundingClientRect();
        return (r.left + r.width / 2) - wrapRect.left;
      });
      subMap[b.id] = { width: wrapRect.width, origin, points: pts };
    });
    setSubLines(subMap);
  };

  const measureTreeRef = useRef(measureTree);
  measureTreeRef.current = measureTree;

  useLayoutEffect(() => {
    measureTree();
  }, [branches]);

  useEffect(() => {
    const handler = () => measureTreeRef.current();
    window.addEventListener('resize', handler);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => measureTreeRef.current());
    }
    const t = setTimeout(() => measureTreeRef.current(), 250);

    let ro;
    if (window.ResizeObserver) {
      ro = new ResizeObserver(() => measureTreeRef.current());
      if (treeWrapRef.current) ro.observe(treeWrapRef.current);
      Object.values(branchCardRefs.current).forEach(el => el && ro.observe(el));
      Object.values(subWrapRefs.current).forEach(el => el && ro.observe(el));
    }

    return () => {
      window.removeEventListener('resize', handler);
      clearTimeout(t);
      if (ro) ro.disconnect();
    };
  }, [branches]);

  const addBranch = () => setBranches([...branches, { id: `b${Date.now()}`, amount: 0, t1: '', t2: '', t3: '', subBranches: [] }]);
  const removeBranch = (id) => setBranches(branches.filter(b => b.id !== id));
  const updateBranch = (id, field, value) => setBranches(branches.map(b => b.id === id ? { ...b, [field]: value } : b));
  const addSubBranch = (bId) => setBranches(branches.map(b => b.id === bId ? { ...b, subBranches: [...b.subBranches, { id: `s${Date.now()}`, amount: 0, t1: '', t2: '', note: '' }] } : b));
  const removeSubBranch = (bId, sId) => setBranches(branches.map(b => b.id === bId ? { ...b, subBranches: b.subBranches.filter(s => s.id !== sId) } : b));
  const updateSubBranch = (bId, sId, field, value) => setBranches(branches.map(b => b.id === bId ? { ...b, subBranches: b.subBranches.map(s => s.id === sId ? { ...s, [field]: value } : s) } : b));

  const sum = (arr) => arr.reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
  const totalIncome = sum(incomes);
  const totalLiving = sum(livingExps);
  const totalSaving = sum(savingExps);
  const totalInsurance = sum(insuranceExps);
  const totalExpense = totalLiving + totalSaving + totalInsurance;
  const totalAssets = sum(assets);
  const totalLoans = sum(loans);
  const netWorth = totalAssets - totalLoans;
  const actualSavingsPool = totalIncome - totalLiving - totalInsurance;

  const distributeTo100 = (values) => {
    const floors = values.map(v => Math.floor(v));
    let remainder = 100 - floors.reduce((a, b) => a + b, 0);
    const order = values.map((v, i) => ({ i, frac: v - floors[i] })).sort((a, b) => b.frac - a.frac);
    const result = [...floors];
    for (let k = 0; k < remainder && k < order.length; k++) {
      result[order[k].i] += 1;
    }
    return result;
  };
  const rawLivingPct = totalIncome ? (totalLiving / totalIncome) * 100 : 0;
  const rawSavingPct = totalIncome ? (actualSavingsPool / totalIncome) * 100 : 0;
  const rawInsurancePct = totalIncome ? (totalInsurance / totalIncome) * 100 : 0;
  const [livingPct, savingPct, insurancePct] = totalIncome
    ? distributeTo100([rawLivingPct, rawSavingPct, rawInsurancePct])
    : [0, 0, 0];

  const handleItemChange = (setter, items, id, field, value) => setter(items.map(item => item.id === id ? { ...item, [field]: value } : item));
  const addItem = (setter, items) => setter([...items, { id: Date.now(), name: '', amount: 0, note: '' }]);
  const removeItem = (setter, items, id) => setter(items.filter(item => item.id !== id));

  const reportRef2 = useRef(null);
  const [isDownloading2, setIsDownloading2] = useState(false);

  // 📝 【修正重點】：強化平板/手機環境下的下載與截圖邏輯
  const downloadRef = async (ref, setBusy, filename) => {
    if (!ref.current) return;
    setBusy(true);
    
    try {
      await new Promise(resolve => setTimeout(resolve, 100));
      
      // 動態調整 scale：若是小螢幕裝置(手機/平板)，降低解析度以免 html2canvas 超出記憶體上限
      const scale = window.innerWidth < 1024 ? 1.5 : 2;
      const canvas = await html2canvas(ref.current, { 
        scale: scale, 
        useCORS: true, 
        backgroundColor: '#ffffff' 
      });

      // 建立備用的下載機制
      const fallbackDownload = (blob) => {
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.style.display = "none";
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => window.URL.revokeObjectURL(url), 100);
      };

      // 轉換為 Blob 物件 (處理行動裝置對 Base64 長度與下載的限制)
      canvas.toBlob(async (blob) => {
        if (!blob) {
          alert("圖片生成失敗！");
          setBusy(false);
          return;
        }

        const file = new File([blob], filename, { type: blob.type });

        // 嘗試喚起行動裝置原生的「分享/儲存圖片」選單 (iOS Safari 的最佳解)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: filename,
            });
          } catch (err) {
            // 用戶取消分享時不強制觸發下載，其他錯誤則退回備用下載
            if (err.name !== 'AbortError') {
              fallbackDownload(blob);
            }
          }
        } else {
          // 不支援 Web Share 的環境 (如傳統桌面版瀏覽器) 執行正常下載
          fallbackDownload(blob);
        }
        
        setBusy(false);
      }, "image/png", 1.0);

    } catch (error) {
      console.error("輸出圖片失敗:", error);
      alert("輸出圖片失敗，請嘗試使用桌面版瀏覽器。");
      setBusy(false);
    }
  };

  const handleDownloadImage = () => downloadRef(reportRef, setIsDownloading, `財務分配報表_${userName}.png`);
  const handleDownloadImage2 = () => downloadRef(reportRef2, setIsDownloading2, `財務規劃紀錄_${userName}.png`);
  
  const [showExportMenu, setShowExportMenu] = useState(false);
  const isDownloadingAny = isDownloading || isDownloading2;
  const handleDownloadBoth = async () => {
    await handleDownloadImage();
    await new Promise(r => setTimeout(r, 500));
    await handleDownloadImage2();
  };

  const RenderList = ({ items, isSaving = false }) => (
    <div className="flex flex-col gap-1.5 mt-3">{items.map(item => (<div key={item.id} className="group flex items-center justify-between py-2.5 px-1 rounded-lg transition-colors" style={{}} onMouseEnter={e=>e.currentTarget.style.background='var(--paper)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}><div className="flex items-center gap-2.5"><span className="font-bold text-[14.5px]" style={{color:'var(--ink)'}}>{item.name || '-'}</span>{item.note && (<span className="text-[11px] px-2.5 py-0.5 rounded-full font-bold" style={{background: isSaving ? 'var(--income-bg)' : 'var(--expense-bg)', color: isSaving ? 'var(--income-deep)' : 'var(--expense-deep)'}}>{item.note}</span>)}</div><span className="font-num font-extrabold text-[15.5px]" style={{color:'var(--ink)'}}>{item.amount > 0 ? Number(item.amount).toLocaleString() : '-'}</span></div>))}</div>
  );

  const InputGroup = ({ label, value, onChange, placeholder, type = "text" }) => (
    <div className="flex flex-col gap-1"><label className="text-[10.5px] font-bold tracking-wider pl-1 uppercase" style={{color:'#a8a49a'}}>{label}</label>{type === "number" ? (<MoneyInput value={value} onChange={v => onChange({ target: { value: v } })} placeholder={placeholder} className="rounded-lg p-2.5 text-sm outline-none transition-colors" style={{background:'#f5f4ef', border:'1.5px solid #e7e5dd', color:'var(--ink)'}}/>) : (<input type={type} value={value} onChange={onChange} className="rounded-lg p-2.5 text-sm outline-none transition-colors" style={{background:'#f5f4ef', border:'1.5px solid #e7e5dd', color:'var(--ink)'}} onFocus={e => e.target.style.borderColor = '#5271e0'} onBlur={e => e.target.style.borderColor = '#e7e5dd'} placeholder={placeholder}/>)}</div>
  );

  return (
    <div className="min-h-screen flex flex-col xl:h-screen" style={{background:'var(--paper)'}}>
      {/* Header */}
      <div className="px-6 py-4 flex justify-between items-center print:hidden z-20 shrink-0" style={{background:'var(--card)', borderBottom:'1px solid var(--line)'}}>
        <div className="flex items-center gap-3.5">
          <div className="w-10 h-10 rounded-2xl flex items-center justify-center" style={{background:'linear-gradient(135deg, var(--income), var(--assets))'}}>
            <IconChart color="#ffffff" />
          </div>
          <div>
            <h1 className="font-display text-lg font-extrabold tracking-tight" style={{color:'var(--ink)'}}>全方位財務分配報表</h1>
            <p className="text-[11px] font-num font-bold tracking-[0.2em] uppercase" style={{color:'#b7b3a8'}}>Architecture of Wealth · v9</p>
          </div>
        </div>
        <div className="relative">
          <button onClick={() => setShowExportMenu(v => !v)} disabled={isDownloadingAny} className={`px-6 py-3 rounded-full font-bold transition-all text-sm tracking-wide flex items-center gap-2 text-white shadow-[0_4px_14px_rgba(82,113,224,0.35)] ${isDownloadingAny ? 'opacity-50 cursor-not-allowed' : 'hover:shadow-[0_6px_20px_rgba(82,113,224,0.45)] hover:-translate-y-0.5'}`} style={{background:'var(--assets)'}}>
            {isDownloadingAny ? '⏳ 正在處理中...' : '⬇ 輸出報表'}
          </button>
          {showExportMenu && !isDownloadingAny && (
            <>
              <div className="fixed inset-0 z-30" onClick={() => setShowExportMenu(false)}></div>
              <div className="absolute right-0 mt-2 w-56 rounded-2xl overflow-hidden z-40" style={{background:'var(--card)', boxShadow:'0 12px 32px rgba(34,37,43,0.16)', border:'1px solid var(--line)'}}>
                <button onClick={() => { setShowExportMenu(false); handleDownloadImage(); }} className="w-full text-left px-5 py-3.5 text-sm font-bold transition-colors hover:bg-black/[0.03]" style={{color:'var(--ink)'}}>
                  只輸出第一頁<div className="text-[11px] font-medium mt-0.5" style={{color:'#a8a49a'}}>財務分配報表</div>
                </button>
                <button onClick={() => { setShowExportMenu(false); handleDownloadImage2(); }} className="w-full text-left px-5 py-3.5 text-sm font-bold transition-colors hover:bg-black/[0.03]" style={{color:'var(--ink)', borderTop:'1px solid var(--line)'}}>
                  只輸出第二頁<div className="text-[11px] font-medium mt-0.5" style={{color:'#a8a49a'}}>財務規劃紀錄</div>
                </button>
                <button onClick={() => { setShowExportMenu(false); handleDownloadBoth(); }} className="w-full text-left px-5 py-3.5 text-sm font-bold transition-colors hover:bg-black/[0.03]" style={{color:'var(--assets-deep)', background:'var(--assets-bg)', borderTop:'1px solid var(--line)'}}>
                  兩頁都輸出<div className="text-[11px] font-medium mt-0.5" style={{color:'var(--assets)'}}>下載兩張 PNG 圖片</div>
                </button>
              </div>
            </>
          )}
        </div>
      </div>

      <div className="flex-1 flex flex-col xl:flex-row xl:overflow-hidden relative">
        {/* 左側：編輯器 */}
        <div className="w-full xl:w-[450px] xl:overflow-y-auto p-6 print:hidden z-10 shrink-0 custom-scrollbar" style={{background:'#ffffff', borderRight:'1px solid var(--line)'}}>

          </div>

          {/* === 第二頁：財務規劃紀錄 === */}
          <div ref={reportRef2} className="page-break p-14 xl:p-20 rounded-[2.5rem] w-[1440px] min-w-[1200px] print:w-full print:min-w-0 print:shadow-none print:p-14 relative flex flex-col" style={{background:'var(--card)', boxShadow:'0 40px 100px rgba(34,37,43,0.20), 0 14px 36px rgba(34,37,43,0.12), 0 4px 10px rgba(34,37,43,0.08)'}}>
            <div className="absolute top-0 right-0 w-[560px] h-[560px] rounded-full glow-blob pointer-events-none" style={{background:'radial-gradient(circle, var(--income-bg) 0%, rgba(255,255,255,0) 68%)', transform:'translate(30%,-40%)'}}></div>
            <div className="absolute bottom-0 left-0 w-[520px] h-[520px] rounded-full glow-blob pointer-events-none" style={{background:'radial-gradient(circle, var(--assets-bg) 0%, rgba(255,255,255,0) 68%)', transform:'translate(-25%,35%)'}}></div>
            
            <div className="text-center mb-16 relative z-10"><div className="flex w-fit items-center gap-2 px-4 py-1.5 rounded-full mb-4 mx-auto" style={{background:'var(--assets-bg)'}}><span className="w-1.5 h-1.5 rounded-full" style={{background:'var(--assets)'}}></span><span className="font-num text-[11px] font-bold tracking-[0.2em]" style={{color:'#37509e'}}>PAGE 2</span></div><h2 className="font-display text-2xl font-extrabold tracking-tight" style={{color:'var(--ink)'}}>{userName} 的財務規劃旅程</h2></div>
            
            <div className="relative z-10 flex-1 max-w-[880px] mx-auto w-full">
              {[{ label: '想完成的事', sub: 'GOALS', value: goals, tone: 'assets', Icon: IconTarget, ph: '例：3年內買房自住、45歲前存到退休金1000萬...' },{ label: '未來可能會遇到的事', sub: 'WHAT MAY COME', value: futureEvents, tone: 'assets', Icon: IconAlert, ph: '例：父母年邁的長照需求、換工作的收入空窗期...' },{ label: '理財盲點', sub: 'BLIND SPOTS', value: blindSpots, tone: 'assets', Icon: IconSearch, ph: '例：緊急預備金不足、保障集中在單一險種...' },].map((f, i) => (
                <div key={i} className="flex gap-6"><div className="flex flex-col items-center"><div className="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style={{background: '#eef1fd'}}><f.Icon color="#37509e" /></div><div className="w-px flex-1 my-2" style={{background:'var(--line)', minHeight:'24px'}}></div></div><div className="flex-1 pb-10"><div className="font-num text-[10.5px] font-bold tracking-[0.2em] uppercase mb-1" style={{color: '#37509e'}}>{f.sub}</div><h3 className="font-display text-[17px] font-extrabold mb-3" style={{color:'var(--ink)'}}>{f.label}</h3><div className="rounded-2xl p-5" style={{background:'var(--paper)', border:'1px solid var(--line)'}}><p className="text-[14.5px] leading-relaxed whitespace-pre-wrap" style={{color: f.value ? 'var(--ink-soft)' : '#c7c4ba'}}>{f.value || '（尚未填寫）'}</p></div></div></div>
              ))}
              {/* 理財建議 */}
              <div className="flex gap-6"><div className="flex flex-col items-center"><div className="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style={{background:'var(--assets-bg)'}}><IconBulb color="#37509e" /></div></div><div className="flex-1"><div className="font-num text-[10.5px] font-bold tracking-[0.2em] uppercase mb-1" style={{color:'var(--assets-deep)'}}>ADVICE</div><h3 className="font-display text-[17px] font-extrabold mb-3" style={{color:'var(--ink)'}}>理財建議</h3><div className="rounded-2xl p-5" style={{background:'var(--paper)', border:'1px solid var(--line)'}}><p className="text-[14.5px] leading-relaxed whitespace-pre-wrap" style={{color: advice ? 'var(--ink-soft)' : '#c7c4ba'}}>{advice || '（尚未填寫）'}</p></div></div></div>
            </div>
            
            <div className="mt-16 pt-8 flex justify-between items-center w-full relative z-10" style={{borderTop:'1.5px solid var(--line)'}}><div className="flex items-center gap-2.5 text-[13px] font-medium" style={{color:'var(--ink-soft)'}}><span className="w-1.5 h-1.5 rounded-full" style={{background:'var(--income)'}}></span>每一步規劃，都是為了讓未來的自己更安心。</div><div className="px-5 py-2.5 rounded-full font-bold text-sm" style={{background:'var(--assets-bg)', color:'var(--assets-deep)'}}>專屬財務顧問 {advisorName}</div></div>
          </div>
        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script></body></html>
